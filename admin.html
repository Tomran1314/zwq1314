<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta property="og:type" content="website">
<meta property="og:title" content="客户名单管理后台">
<meta property="og:description" content="汇成百年 · 课程报名名单管理">
<meta property="og:image" content="https://xf.zwq1314.com/share.jpg">
<title>汇成百年 · 客户管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --rose:#F3A73B;--deep-rose:#D97D0D;--gold:#C9974A;--gold-light:#F5E3C0;
  --bg:#FBF6EE;--card:#fff;--text-dark:#2E2013;--text-mid:#7A5A32;
  --text-soft:#B08A5C;--border:#F0DFC2;
  --green:#43A047;--blue:#1E88E5;--orange:#FB8C00;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text-dark);min-height:100vh;-webkit-tap-highlight-color:transparent}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,#FFF3DD,#FFEAC7,#FFF9EE);padding:20px}
.login-card{background:#fff;border-radius:28px;padding:40px 28px 32px;width:100%;max-width:360px;box-shadow:0 24px 60px rgba(217,125,13,0.18);text-align:center}
.login-logo{font-size:2.8rem;margin-bottom:10px}
.login-title{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.login-sub{font-size:0.82rem;color:var(--text-soft);margin-bottom:32px}
.field{margin-bottom:16px;text-align:left}
.field label{display:block;font-size:0.78rem;color:var(--text-mid);font-weight:600;margin-bottom:6px}
.field input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:14px;font-size:1rem;font-family:'Noto Sans SC',sans-serif;outline:none;transition:border 0.2s;background:#FFFCF5}
.field input:focus{border-color:var(--rose);background:#fff}
.login-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--deep-rose),var(--gold));color:#fff;border:none;border-radius:14px;font-size:1rem;font-family:'Noto Sans SC',sans-serif;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(217,125,13,0.35)}
.login-err{color:#C62828;font-size:0.82rem;margin-top:12px;display:none}

/* APP */
#app-screen{display:none;min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,#C86A00 0%,#F0A028 60%,var(--gold) 100%);padding:14px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(200,106,0,0.3)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-title{color:#fff;font-size:1rem;font-weight:700}
.hdr-actions{display:flex;gap:8px;align-items:center}
.hdr-user{background:rgba(255,255,255,0.2);color:#fff;padding:5px 12px;border-radius:20px;font-size:0.76rem;font-weight:500}
.hdr-logout{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.35);padding:5px 12px;border-radius:20px;font-size:0.76rem;cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:rgba(255,255,255,0.15);border-radius:14px;overflow:hidden;margin-bottom:8px}
.stat{text-align:center;padding:10px 4px}
.stat-n{font-size:1.4rem;font-weight:700;color:#fff;line-height:1}
.stat-l{font-size:0.62rem;color:rgba(255,255,255,0.82);margin-top:3px}
.staff-stats{display:flex;flex-wrap:nowrap;gap:6px;padding:0 2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.staff-stats::-webkit-scrollbar{display:none}
.staff-stat-btn{flex:0 0 auto;min-width:76px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:10px;padding:7px 12px;text-align:center;cursor:pointer;transition:all 0.2s}
.staff-stat-btn:hover,.staff-stat-btn.active{background:rgba(255,255,255,0.35);border-color:rgba(255,255,255,0.6)}
.staff-stat-btn .sn{font-size:1.1rem;font-weight:700;color:#fff;line-height:1}
.staff-stat-btn .sl{font-size:0.65rem;color:rgba(255,255,255,0.85);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat{text-align:center;padding:10px 4px}
.stat-n{font-size:1.4rem;font-weight:700;color:#fff;line-height:1}
.stat-l{font-size:0.62rem;color:rgba(255,255,255,0.82);margin-top:3px}

/* TOOLBAR */
.toolbar{background:var(--card);padding:12px 14px;border-bottom:1px solid var(--border);position:sticky;top:88px;z-index:90}
.search-row{position:relative;margin-bottom:10px}
.search-row input{width:100%;padding:11px 14px 11px 38px;border:1.5px solid var(--border);border-radius:12px;font-size:0.9rem;font-family:'Noto Sans SC',sans-serif;outline:none;background:#FFFCF5}
.search-row input:focus{border-color:var(--rose);background:#fff}
.search-row::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:0.85rem}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:0.78rem;font-family:'Noto Sans SC',sans-serif;cursor:pointer;color:var(--text-mid);white-space:nowrap}
.fbtn.active{background:var(--deep-rose);color:#fff;border-color:var(--deep-rose)}
.refresh-btn{flex-shrink:0;padding:7px 14px;background:linear-gradient(135deg,var(--deep-rose),var(--gold));color:#fff;border:none;border-radius:20px;font-size:0.78rem;font-family:'Noto Sans SC',sans-serif;cursor:pointer}
.export-btn{flex-shrink:0;padding:7px 14px;background:linear-gradient(135deg,#43A047,#2E7D32);color:#fff;border:none;border-radius:20px;font-size:0.78rem;font-family:'Noto Sans SC',sans-serif;cursor:pointer}

/* CARDS */
.cards{padding:12px 12px 80px}
.card{background:var(--card);border-radius:18px;padding:16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(217,125,13,0.07);border:1px solid #FBF0DC;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.card.s-new::before{background:var(--orange)}
.card.s-contacted::before{background:var(--blue)}
.card.s-converted::before{background:var(--green)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.card-name{font-size:1rem;font-weight:700}
.name-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px}
.card-time{font-size:0.72rem;color:var(--text-soft);margin-top:2px}
.card-staff{font-size:0.74rem;color:var(--deep-rose);font-weight:500;background:#FFF3DD;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.card-country{font-size:0.74rem;color:#1565C0;font-weight:500;background:#E3F2FD;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.card-course{font-size:0.74rem;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.card-course.c-ai{color:#C04808;background:#FFF3E0}
.card-course.c-seed{color:#AD1457;background:#FCE4EC}
.card-info{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.info-row{display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text-mid)}
.info-icon{font-size:0.85rem;width:18px;text-align:center;flex-shrink:0}

/* TAGS */
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{padding:4px 10px;border-radius:20px;font-size:0.74rem;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text-mid);transition:all 0.2s;user-select:none}
.tag.active{border-color:var(--deep-rose);background:#FFF0F3;color:var(--deep-rose);font-weight:500}

/* WA BUTTON */
.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:none;border-radius:12px;font-size:0.9rem;font-family:'Noto Sans SC',sans-serif;font-weight:600;cursor:pointer;margin-bottom:10px;box-shadow:0 3px 10px rgba(37,211,102,0.28)}

/* CARD ACTIONS */
.card-actions{display:flex;gap:8px;align-items:center}
.status-sel{flex:1;padding:9px 8px;border-radius:10px;border:1.5px solid var(--border);font-size:0.8rem;font-family:'Noto Sans SC',sans-serif;cursor:pointer;background:#fff;outline:none}
.note-btn{flex-shrink:0;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:0.78rem;cursor:pointer;color:var(--text-mid);white-space:nowrap}
.note-btn.has-note{border-color:var(--gold);color:var(--gold);background:#FFFBF0}
.note-preview{margin-top:8px;background:#FFFBF0;border-radius:10px;padding:8px 12px;font-size:0.8rem;color:var(--text-mid);border-left:3px solid var(--gold);line-height:1.5}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text-soft)}
.empty .icon{font-size:3rem;margin-bottom:12px}
.empty p{font-size:0.92rem}

/* PAGINATION */
.pagination{display:flex;gap:6px;justify-content:center;padding:16px 12px 24px;flex-wrap:wrap;align-items:center}
.pbtn{padding:8px 14px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:0.82rem;cursor:pointer;color:var(--text-mid)}
.pbtn.active{background:var(--deep-rose);color:#fff;border-color:var(--deep-rose)}
.pbtn:disabled{opacity:0.35;cursor:default}
.pinfo{font-size:0.78rem;color:var(--text-soft)}

.err-bar{background:#FFF3F3;border:1px solid #FFCDD2;border-radius:12px;padding:12px 16px;color:#C62828;font-size:0.83rem;margin:12px;display:none}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(45,26,31,0.5);z-index:300;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal-box{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:500px;box-shadow:0 -8px 40px rgba(217,125,13,0.2);max-height:85vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 18px}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:0.82rem;color:var(--text-soft);margin-bottom:14px}
.modal-ta{width:100%;min-height:90px;padding:12px 14px;border:1.5px solid var(--border);border-radius:14px;font-size:0.9rem;font-family:'Noto Sans SC',sans-serif;resize:none;outline:none;background:#FFFCF5}
.modal-ta:focus{border-color:var(--rose)}
.modal-acts{display:flex;gap:10px;margin-top:14px}
.btn-cancel{flex:1;padding:13px;border-radius:12px;border:1.5px solid var(--border);background:#fff;font-size:0.9rem;font-family:'Noto Sans SC',sans-serif;cursor:pointer;color:var(--text-mid)}
.btn-save{flex:2;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--deep-rose),var(--gold));color:#fff;font-size:0.9rem;font-family:'Noto Sans SC',sans-serif;font-weight:600;cursor:pointer}

/* WA MODAL */
.wa-preview{background:#DCF8C6;border-radius:14px 14px 0 14px;padding:12px 14px;font-size:0.88rem;color:#1a1a1a;line-height:1.6;margin-bottom:14px}
.wa-send-btn{width:100%;padding:14px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:none;border-radius:14px;font-size:1rem;font-family:'Noto Sans SC',sans-serif;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(37,211,102,0.35);margin-top:10px}
.section-label{font-size:0.76rem;color:var(--text-mid);font-weight:600;margin-bottom:6px;letter-spacing:0.04em}

/* EXPORT MODAL */
.export-options{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.export-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all 0.2s}
.export-opt:hover{border-color:var(--rose);background:#FFF8FA}
.export-opt input[type=checkbox]{width:18px;height:18px;accent-color:var(--deep-rose);cursor:pointer}
.export-opt label{font-size:0.88rem;cursor:pointer;flex:1}
.export-go-btn{width:100%;padding:14px;background:linear-gradient(135deg,#43A047,#2E7D32);color:#fff;border:none;border-radius:14px;font-size:1rem;font-family:'Noto Sans SC',sans-serif;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(67,160,71,0.3)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🌸</div>
    <div class="login-title">AI财道 & 播种幸福 · 客户管理</div>
    <div class="login-sub">客户管理后台 · 汇成百年</div>
    <div class="field"><label>用户名</label><input type="text" id="lu" placeholder="输入用户名" autocomplete="username"/></div>
    <div class="field"><label>密码</label><input type="password" id="lp" placeholder="输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="login-btn" onclick="doLogin()">登 录</button>
    <div class="login-err" id="lerr">用户名或密码错误，请重试</div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-title">🌸 客户管理后台</div>
      <div class="hdr-actions">
        <div class="hdr-user" id="hdr-user">–</div>
        <button class="hdr-logout" onclick="doLogout()">退出</button>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="st-total">–</div><div class="stat-l">总客户</div></div>
      <div class="stat"><div class="stat-n" id="st-new">–</div><div class="stat-l">未联系</div></div>
      <div class="stat"><div class="stat-n" id="st-contacted">–</div><div class="stat-l">已联系</div></div>
      <div class="stat"><div class="stat-n" id="st-converted">–</div><div class="stat-l">已成交</div></div>
    </div>
    <div class="staff-stats" id="staff-stats" style="display:none;margin-top:10px;display:none"></div>
  </div>

  <div class="toolbar">
    <div class="search-row"><input type="text" id="search-inp" placeholder="搜索姓名、号码、邮箱、标签…" oninput="applyFilters()"/></div>
    <div class="filter-row">
      <button class="fbtn active" onclick="setFilter('all',this)">全部</button>
      <button class="fbtn" onclick="setCourseFilter('AI财道',this)" id="course-ai-btn">🚀 AI财道</button>
      <button class="fbtn" onclick="setCourseFilter('播种幸福',this)" id="course-seed-btn">🌸 播种幸福</button>
      <button class="fbtn" onclick="setFilter('未联系',this)">未联系</button>
      <button class="fbtn" onclick="setFilter('已联系',this)">已联系</button>
      <button class="fbtn" onclick="setFilter('已成交',this)">已成交</button>
      <button class="fbtn" onclick="setFilter('tag',this)" id="tag-filter-btn">🏷️ 标签筛选</button>
      <button class="fbtn" onclick="openCountryFilter()" id="country-filter-btn">🌏 国家筛选</button>
      <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
      <button class="export-btn" onclick="openExport()">📊 导出</button>
    </div>
  </div>

  <div class="err-bar" id="err-bar"></div>
  <div class="cards" id="cards-wrap"></div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- NOTE MODAL -->
<div class="modal-bg" id="note-modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">📝 跟进备注</div>
    <div class="modal-sub" id="note-name"></div>
    <textarea class="modal-ta" id="note-ta" placeholder="输入备注内容…" rows="4"></textarea>
    <div class="modal-acts">
      <button class="btn-cancel" onclick="closeNote()">取消</button>
      <button class="btn-save" onclick="saveNote()">保存备注</button>
    </div>
  </div>
</div>

<!-- WA MODAL -->
<div class="modal-bg" id="wa-modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">💬 发送 WhatsApp</div>
    <div class="modal-sub" id="wa-sub"></div>
    <div class="section-label">消息预览</div>
    <div class="wa-preview" id="wa-preview"></div>
    <div class="section-label">编辑消息</div>
    <textarea class="modal-ta" id="wa-ta" rows="3" oninput="document.getElementById('wa-preview').textContent=this.value"></textarea>
    <button class="wa-send-btn" onclick="sendWA()">📲 立即发送 WhatsApp</button>
    <div class="modal-acts" style="margin-top:10px">
      <button class="btn-cancel" onclick="closeWA()">取消</button>
    </div>
  </div>
</div>

<!-- TAG FILTER MODAL -->
<div class="modal-bg" id="tag-filter-modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">🏷️ 按标签筛选</div>
    <div class="modal-sub">选择要筛选的标签</div>
    <div class="tags-wrap" id="tag-filter-wrap"></div>
    <div class="modal-acts">
      <button class="btn-cancel" onclick="closeTagFilter()">取消</button>
      <button class="btn-save" onclick="applyTagFilter()">确认筛选</button>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-bg" id="export-modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">📊 导出 Excel 名单</div>
    <div class="modal-sub">选择要导出的内容范围</div>
    <div class="export-options">
      <div class="export-opt"><input type="radio" name="exp" id="exp-all" value="all" checked/><label for="exp-all">📋 全部客户（<span id="exp-count-all">0</span> 人）</label></div>
      <div class="export-opt"><input type="radio" name="exp" id="exp-filtered" value="filtered"/><label for="exp-filtered">🔍 当前筛选结果（<span id="exp-count-filtered">0</span> 人）</label></div>
      <div class="export-opt"><input type="radio" name="exp" id="exp-new" value="status-未联系"/><label for="exp-new">⭕ 仅未联系（<span id="exp-count-new">0</span> 人）</label></div>
      <div class="export-opt"><input type="radio" name="exp" id="exp-contacted" value="status-已联系"/><label for="exp-contacted">🔵 仅已联系（<span id="exp-count-contacted">0</span> 人）</label></div>
      <div class="export-opt"><input type="radio" name="exp" id="exp-converted" value="status-已成交"/><label for="exp-converted">✅ 仅已成交（<span id="exp-count-converted">0</span> 人）</label></div>
    </div>
    <button class="export-go-btn" onclick="doExport()">⬇️ 下载 Excel</button>
    <div class="modal-acts" style="margin-top:10px">
      <button class="btn-cancel" onclick="closeExport()">取消</button>
    </div>
  </div>
</div>

<script>
const ACCOUNTS = {
  'tomran':    {pass:'131419', name:'Tom Ran（管理员）', staff:null,      role:'admin'},
  'zhiying':   {pass:'zy1234', name:'志颖老师',          staff:'志颖老师', role:'staff'},
  'yuecong':   {pass:'yc1234', name:'越聪老师',          staff:'越聪老师', role:'staff'},
  'xinyu':     {pass:'xy1234', name:'馨予老师',          staff:'馨予老师', role:'staff'},
  'qide':      {pass:'qd1234', name:'齐得老师',          staff:'齐得老师', role:'staff'},
  'sam':       {pass:'sam1234',name:'Sam老师',           staff:'Sam老师',  role:'staff'},
  'xiaohe':    {pass:'he1234', name:'小何老师',          staff:'小何老师', role:'staff'},
  'dapeng':    {pass:'dp1234', name:'大鹏老师',          staff:'大鹏老师', role:'staff'},
  'huangjuan': {pass:'hj1234', name:'黄娟老师',          staff:'黄娟老师', role:'staff'},
};

// 客服别名分组：同一位老师在不同课程表里的名称都算作同一人
const STAFF_GROUPS = {
  '志颖老师': ['志颖老师'],
  '越聪老师': ['越聪老师'],
  '馨予老师': ['馨予老师'],
  '齐得老师': ['齐得老师'],
  'Sam老师':  ['Sam老师'],
  '小何老师': ['小何老师','小何助教'],
  '大鹏老师': ['大鹏老师'],
  '黄娟老师': ['黄娟老师'],
};
function staffMatch(rowStaff, groupName){
  const aliases = STAFF_GROUPS[groupName] || [groupName];
  return aliases.includes(rowStaff);
}

// ★ 统一脚本网址（播种幸福+AI财道共用一张表）：若重新部署 Apps Script 产生了新网址，替换下面这一行即可
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwPr7rYQejBA3K7Dw3AoIaTAATZizRWiH1Ya1j-weoP1cvSD9XfKVnViCkfuAYvQgM/exec';
const COURSE_AI = 'AI财道';
const COURSE_SEED = '播种幸福';
const PAGE_SIZE = 15;

const ALL_TAGS = ['🔥 高意向','💰 已付款','✅ 确定上课','🔕 未回复','📅 下一期','🤔 考虑中','❌ 不感兴趣','📞 需回电','🤝 汇播合伙人','🎓 训练营'];

let currentUser=null, allRows=[], filteredRows=[];
let currentPage=1, currentFilter='all', activeTagFilter=null, activeCourseFilter=null;
let activePhone=null, activeWAPhone=null;

function sk(k){return `hc_${currentUser.username}_${k}`;}
function gm(k){try{return JSON.parse(localStorage.getItem(sk(k))||'{}')}catch(e){return{}}}
function sm(k,v){localStorage.setItem(sk(k),JSON.stringify(v));}

// LOGIN
function enterApp(u, acc){
  currentUser={username:u,...acc};
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('hdr-user').textContent=currentUser.name;
  loadData();
}
function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase();
  const p=document.getElementById('lp').value;
  const acc=ACCOUNTS[u];
  if(!acc||acc.pass!==p){document.getElementById('lerr').style.display='block';return;}
  localStorage.setItem('hc_session', JSON.stringify({username:u}));
  enterApp(u, acc);
}
function doLogout(){
  localStorage.removeItem('hc_session');
  currentUser=null;allRows=[];filteredRows=[];
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('lu').value='';
  document.getElementById('lp').value='';
  document.getElementById('lerr').style.display='none';
}
// 自动恢复登录状态
(function(){
  try{
    const s=JSON.parse(localStorage.getItem('hc_session')||'null');
    if(s&&s.username&&ACCOUNTS[s.username]) enterApp(s.username, ACCOUNTS[s.username]);
  }catch(e){}
})();

// LOAD DATA（单一数据源：播种幸福+AI财道 共用一张表，课程从 I 列「课程备注」读取）
function parseTimeMs(rawTime, idx){
  try{
    const m = rawTime.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})(?:\s*(上午|下午)?\s*(\d{1,2}):(\d{2})(?::(\d{2}))?)?/);
    if(m){
      let h = parseInt(m[5]||'0');
      if(m[4]==='下午' && h<12) h+=12;
      if(m[4]==='上午' && h===12) h=0;
      return new Date(+m[1], +m[2]-1, +m[3], h, +(m[6]||0), +(m[7]||0)).getTime();
    }
    const d = new Date(rawTime);
    if(!isNaN(d)) return d.getTime();
  }catch(e){}
  return idx; // 解析失败时按表格行号兜底（行号越大越新）
}
function parseRows(data){
  return data.slice(1).map((cols,i)=>{
    const val=idx=>String(cols[idx]||'').trim();
    const rawTime = val(0);
    let time = rawTime;
    try {
      // 支持 "2026/6/18 下午 1:39:08" 格式
      const m = rawTime.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})\s*(上午|下午)\s*(\d{1,2}):(\d{2})/);
      if (m) {
        let h = parseInt(m[5]);
        if (m[4]==='下午' && h<12) h+=12;
        if (m[4]==='上午' && h===12) h=0;
        time = `${m[1]}/${m[2]}/${m[3]} ${String(h).padStart(2,'0')}:${m[6]}`;
      } else {
        const d = new Date(rawTime);
        if (!isNaN(d)) {
          time = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }
      }
    } catch(e) {}
    // I列「课程备注」：含 AI → AI财道，否则归为播种幸福
    const rawCourse = val(8);
    const course = rawCourse.indexOf('AI')>-1 ? COURSE_AI : COURSE_SEED;
    return{idx:i+1,time,rawTime,ms:parseTimeMs(rawTime,i+1),name:val(1),phone:val(2),email:val(3),line:val(4),waNum:val(5),staff:val(6),country:val(7),course,sheetNote:val(9)};
  }).filter(r=>r.name||r.phone);
}

async function loadData(){
  document.getElementById('cards-wrap').innerHTML=`<div class="empty"><div class="icon">⏳</div><p>正在加载数据…</p></div>`;
  document.getElementById('err-bar').style.display='none';
  let rows=[];
  try{
    const data=await fetch(SCRIPT_URL).then(r=>r.json());
    if(Array.isArray(data)) rows=parseRows(data);
  }catch(e){}

  if(!rows.length){
    const eb=document.getElementById('err-bar');
    eb.style.display='block';
    eb.textContent='⚠️ 无法加载数据，请确认 Apps Script 已部署为"任何人可访问"，然后点击刷新。';
    document.getElementById('cards-wrap').innerHTML=`<div class="empty"><div class="icon">😅</div><p>加载失败，请刷新重试</p></div>`;
    return;
  }
  // 新名单在最前：按提交时间从新到旧排列
  rows.sort((a,b)=>(b.ms-a.ms)||(b.idx-a.idx));
  allRows=rows;
  if(currentUser.role==='staff') allRows=allRows.filter(r=>staffMatch(r.staff, currentUser.staff));
  applyFilters();
}

// STATS
function updateStats(){
  const s=gm('status');let n=0,c=0,cv=0;
  allRows.forEach(r=>{const st=s[r.phone]||'未联系';if(st==='未联系')n++;else if(st==='已联系')c++;else cv++;});
  document.getElementById('st-total').textContent=allRows.length;
  document.getElementById('st-new').textContent=n;
  document.getElementById('st-contacted').textContent=c;
  document.getElementById('st-converted').textContent=cv;

  // 管理员显示客服分类统计
  const staffStatsEl=document.getElementById('staff-stats');
  if(currentUser.role==='admin'){
    const staffList=['志颖老师','越聪老师','馨予老师','齐得老师','Sam老师','小何老师','大鹏老师','黄娟老师'];
    const counts={};
    staffList.forEach(st=>counts[st]=0);
    allRows.forEach(r=>{ staffList.forEach(st=>{ if(staffMatch(r.staff,st)) counts[st]++; }); });
    staffStatsEl.style.display='flex';
    staffStatsEl.innerHTML=staffList.map(st=>`
      <div class="staff-stat-btn ${currentFilter==='staff-'+st?'active':''}" onclick="filterByStaff('${st}')">
        <div class="sn">${counts[st]}</div>
        <div class="sl">${st}</div>
      </div>`).join('');
  } else {
    staffStatsEl.style.display='none';
  }
}

// FILTER
function countryFlag(c){
  const f={
    '马来西亚':'🇲🇾','马来':'🇲🇾',
    '台湾':'🇨🇳','台灣':'🇨🇳',
    '新加坡':'🇸🇬',
    '中国':'🇨🇳','中國':'🇨🇳',
    '香港':'🇭🇰',
    '澳门':'🇲🇴','澳門':'🇲🇴',
    '印尼':'🇮🇩',
    '泰国':'🇹🇭','泰國':'🇹🇭',
    '菲律宾':'🇵🇭','菲律賓':'🇵🇭',
    '越南':'🇻🇳',
    '缅甸':'🇲🇲','緬甸':'🇲🇲',
    '文莱':'🇧🇳','文萊':'🇧🇳',
    '日本':'🇯🇵',
    '韩国':'🇰🇷','韓國':'🇰🇷',
    '澳大利亚':'🇦🇺','澳大利亞':'🇦🇺',
    '新西兰':'🇳🇿','新西蘭':'🇳🇿',
  };
  return (f[c]||'🌏')+' ';
}

let activeCountryFilter=null;
function openCountryFilter(){
  // 收集现有国家
  const countries=[...new Set(allRows.map(r=>r.country).filter(Boolean))].sort();
  if(!countries.length){alert('暂无国家数据');return;}
  const wrap=document.getElementById('tag-filter-wrap');
  wrap.innerHTML=countries.map(c=>`<span class="tag ${activeCountryFilter===c?'active':''}" onclick="selectTagFilter('${esc(c)}',this)">${countryFlag(c)}${c}</span>`).join('');
  document.getElementById('note-name').textContent='';
  // reuse tag filter modal
  pendingTagFilter=activeCountryFilter;
  document.getElementById('tag-filter-modal').classList.add('show');
  // override confirm button
  document.querySelector('#tag-filter-modal .btn-save').onclick=applyCountryFilter;
}
function applyCountryFilter(){
  activeCountryFilter=pendingTagFilter;
  const btn=document.getElementById('country-filter-btn');
  if(activeCountryFilter){
    btn.textContent=countryFlag(activeCountryFilter)+activeCountryFilter;
    btn.classList.add('active');
  } else {
    btn.textContent='🌏 国家筛选';
    btn.classList.remove('active');
  }
  currentFilter='all'; currentPage=1;
  document.querySelectorAll('.fbtn:not(#country-filter-btn):not(#tag-filter-btn)').forEach(b=>b.classList.remove('active'));
  document.querySelector('.fbtn').classList.add('active');
  closeTagFilter();
  // restore tag confirm button
  document.querySelector('#tag-filter-modal .btn-save').onclick=applyTagFilter;
  applyFilters();
}
function filterByStaff(staff){
  if(currentFilter==='staff-'+staff){
    // 再次点击取消筛选
    currentFilter='all';
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.fbtn').classList.add('active');
  } else {
    currentFilter='staff-'+staff;
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  }
  currentPage=1;applyFilters();
}
function setFilter(val,btn){
  if(val==='tag'){openTagFilterModal();return;}
  currentFilter=val;activeTagFilter=null;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentPage=1;applyFilters();
}
function setCourseFilter(course,btn){
  if(activeCourseFilter===course){
    activeCourseFilter=null;
    btn.classList.remove('active');
  } else {
    activeCourseFilter=course;
    document.getElementById('course-ai-btn').classList.remove('active');
    document.getElementById('course-seed-btn').classList.remove('active');
    btn.classList.add('active');
  }
  currentPage=1;applyFilters();
}
function applyFilters(){
  const q=document.getElementById('search-inp').value.toLowerCase();
  const s=gm('status');const tm=gm('tags');
  filteredRows=allRows.filter(r=>{
    const mq=!q||[r.name,r.phone,r.email,r.staff,r.line,r.course,...(tm[r.phone]||[])].some(v=>String(v).toLowerCase().includes(q));
    const st=s[r.phone]||'未联系';
    const mf=currentFilter==='all'||st===currentFilter||(currentFilter.startsWith('staff-')&&staffMatch(r.staff,currentFilter.replace('staff-','')));
    const mt=!activeTagFilter||(tm[r.phone]||[]).includes(activeTagFilter);
    const mc=!activeCountryFilter||r.country===activeCountryFilter;
    const mcourse=!activeCourseFilter||r.course===activeCourseFilter;
    return mq&&mf&&mt&&mc&&mcourse;
  });
  currentPage=1;updateStats();renderCards();renderPagination();
}

// RENDER CARDS
function renderCards(){
  const wrap=document.getElementById('cards-wrap');
  if(!filteredRows.length){wrap.innerHTML=`<div class="empty"><div class="icon">💰</div><p>暂无匹配客户</p></div>`;return;}
  const s=gm('status');const nm=gm('notes');const tm=gm('tags');
  const start=(currentPage-1)*PAGE_SIZE;
  const slice=filteredRows.slice(start,start+PAGE_SIZE);
  const isAdmin=currentUser.role==='admin';

  wrap.innerHTML=slice.map(r=>{
    const status=s[r.phone]||'未联系';
    const note=nm[r.phone]||'';
    const tags=tm[r.phone]||[];
    const scls=status==='未联系'?'s-new':status==='已联系'?'s-contacted':'s-converted';
    const selColor=status==='未联系'?'#FB8C00':status==='已联系'?'#1E88E5':'#43A047';
    const staffBadge=isAdmin&&r.staff?`<span class="card-staff">${esc(r.staff)}</span>`:'';
    const countryBadge=r.country?`<span class="card-country">${countryFlag(r.country)}${esc(r.country)}</span>`:'';
    const courseBadge=r.course?`<span class="card-course ${r.course===COURSE_AI?'c-ai':'c-seed'}">${r.course===COURSE_AI?'🚀':'🌸'} ${esc(r.course)}</span>`:'';
    const notePreview=note?`<div class="note-preview">💬 ${esc(note)}</div>`:'';
    const tagsHtml=ALL_TAGS.map(t=>`<span class="tag ${tags.includes(t)?'active':''}" onclick="toggleTag('${esc(r.phone)}','${esc(t)}')">${t}</span>`).join('');
    return `<div class="card ${scls}" id="card-${esc(r.phone.replace(/\+/g,'p'))}">
      <div class="card-top">
        <div style="flex:1;min-width:0">
          <div class="name-row"><span class="card-name">${esc(r.name)}</span>${countryBadge}${staffBadge}${courseBadge}</div>
          <div class="card-time">🕐 ${r.time}</div>
        </div>
      </div>
      <div class="card-info">
        ${r.phone?`<div class="info-row"><span class="info-icon">📱</span>${r.phone}</div>`:''}
        ${r.email?`<div class="info-row"><span class="info-icon">✉️</span>${esc(r.email)}</div>`:''}
        ${r.line?`<div class="info-row"><span class="info-icon">💚</span>Line: ${esc(r.line)}</div>`:''}
      </div>
      <div class="tags-wrap">${tagsHtml}</div>
      ${r.phone?`<button class="wa-btn" onclick="openWA('${esc(r.phone)}','${esc(r.name)}','${esc(r.course||'')}')">💬 WhatsApp 联系 ${esc(r.name)}</button>`:''}
      <div class="card-actions">
        <select class="status-sel" onchange="setStatus('${esc(r.phone)}',this.value)" style="border-color:${selColor};color:${selColor}">
          <option value="未联系" ${status==='未联系'?'selected':''}>⭕ 未联系</option>
          <option value="已联系" ${status==='已联系'?'selected':''}>🔵 已联系</option>
          <option value="已成交" ${status==='已成交'?'selected':''}>✅ 已成交</option>
        </select>
        <button class="note-btn ${note?'has-note':''}" onclick="openNote('${esc(r.phone)}','${esc(r.name)}')">${note?'📝 备注':'＋ 备注'}</button>
      </div>
      ${notePreview}
    </div>`;
  }).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/'/g,"&#39;").replace(/"/g,'&quot;');}

// STATUS
function setStatus(phone,val){
  const s=gm('status');s[phone]=val;sm('status',s);updateStats();
  // update card border color
  const sel=status=>{return status==='未联系'?'s-new':status==='已联系'?'s-contacted':'s-converted';};
  const card=document.getElementById('card-'+phone.replace(/\+/g,'p'));
  if(card){card.className=`card ${sel(val)}`;}
}

// TAGS
function toggleTag(phone,tag){
  const tm=gm('tags');
  if(!tm[phone]) tm[phone]=[];
  const idx=tm[phone].indexOf(tag);
  if(idx>-1) tm[phone].splice(idx,1); else tm[phone].push(tag);
  sm('tags',tm);
  // update tag UI inline
  renderCards();
}

// TAG FILTER MODAL
let pendingTagFilter=null;
function openTagFilterModal(){
  pendingTagFilter=activeTagFilter;
  const wrap=document.getElementById('tag-filter-wrap');
  wrap.innerHTML=ALL_TAGS.map(t=>`<span class="tag ${pendingTagFilter===t?'active':''}" onclick="selectTagFilter('${esc(t)}',this)">${t}</span>`).join('');
  document.getElementById('tag-filter-modal').classList.add('show');
}
function selectTagFilter(tag,el){
  pendingTagFilter=pendingTagFilter===tag?null:tag;
  document.querySelectorAll('#tag-filter-wrap .tag').forEach(t=>t.classList.remove('active'));
  if(pendingTagFilter) el.classList.add('active');
}
function closeTagFilter(){document.getElementById('tag-filter-modal').classList.remove('show');}
function applyTagFilter(){
  activeTagFilter=pendingTagFilter;
  if(activeTagFilter){
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    document.getElementById('tag-filter-btn').classList.add('active');
    document.getElementById('tag-filter-btn').textContent='🏷️ '+activeTagFilter;
  } else {
    document.getElementById('tag-filter-btn').textContent='🏷️ 标签筛选';
  }
  currentFilter='all';currentPage=1;
  closeTagFilter();applyFilters();
}

// WA MODAL
function openWA(phone,name,course){
  activeWAPhone=phone;
  const staffName=currentUser.staff||currentUser.name;
  const msg=course===COURSE_AI
    ?`同学您好，我是您这次《AI财道陪跑4天营》的服务老师 ${staffName}，现在对接您学习 🚀`
    :`同学您好，我是您这次《播种幸福4天营》的服务老师 ${staffName}，现在对接您学习 🌸`;
  document.getElementById('wa-sub').textContent=`发送给：${name} (${phone})`;
  document.getElementById('wa-preview').textContent=msg;
  document.getElementById('wa-ta').value=msg;
  document.getElementById('wa-modal').classList.add('show');
}
function closeWA(){document.getElementById('wa-modal').classList.remove('show');activeWAPhone=null;}
function sendWA(){
  const msg=document.getElementById('wa-ta').value.trim();
  window.open(`https://wa.me/${activeWAPhone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');
  closeWA();
}

// NOTE MODAL
function openNote(phone,name){
  activePhone=phone;
  document.getElementById('note-name').textContent=name;
  document.getElementById('note-ta').value=gm('notes')[phone]||'';
  document.getElementById('note-modal').classList.add('show');
}
function closeNote(){document.getElementById('note-modal').classList.remove('show');activePhone=null;}
function saveNote(){
  if(!activePhone) return;
  const val=document.getElementById('note-ta').value.trim();
  const nm=gm('notes');
  if(val) nm[activePhone]=val; else delete nm[activePhone];
  sm('notes',nm);closeNote();renderCards();
}

// EXPORT MODAL
function openExport(){
  const s=gm('status');
  let n=0,c=0,cv=0;
  allRows.forEach(r=>{const st=s[r.phone]||'未联系';if(st==='未联系')n++;else if(st==='已联系')c++;else cv++;});
  document.getElementById('exp-count-all').textContent=allRows.length;
  document.getElementById('exp-count-filtered').textContent=filteredRows.length;
  document.getElementById('exp-count-new').textContent=n;
  document.getElementById('exp-count-contacted').textContent=c;
  document.getElementById('exp-count-converted').textContent=cv;
  document.getElementById('export-modal').classList.add('show');
}
function closeExport(){document.getElementById('export-modal').classList.remove('show');}
function doExport(){
  const val=document.querySelector('input[name=exp]:checked').value;
  const s=gm('status');const nm=gm('notes');const tm=gm('tags');
  let rows=allRows;
  if(val==='filtered') rows=filteredRows;
  else if(val.startsWith('status-')) rows=allRows.filter(r=>(s[r.phone]||'未联系')===val.replace('status-',''));

  const data=rows.map(r=>({
    '时间':r.time,
    '课程':r.course||'',
    '姓名':r.name,
    'WhatsApp':r.phone,
    '邮箱':r.email,
    'Line ID':r.line,
    '负责客服':r.staff,
    '跟进状态':s[r.phone]||'未联系',
    '标签':(tm[r.phone]||[]).join(', '),
    '备注':nm[r.phone]||'',
  }));

  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'客户名单',ws);
  // 设置列宽
  ws['!cols']=[{wch:18},{wch:10},{wch:14},{wch:16},{wch:24},{wch:14},{wch:12},{wch:10},{wch:28},{wch:30}];
  const now=new Date();
  const fname=`客户名单_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb,fname);
  closeExport();
}

// PAGINATION
function renderPagination(){
  const total=Math.ceil(filteredRows.length/PAGE_SIZE);
  const pg=document.getElementById('pagination');
  if(total<=1){pg.innerHTML='';return;}
  let html=`<button class="pbtn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← 上页</button>`;
  for(let i=1;i<=total;i++){
    if(total>7&&i>2&&i<total-1&&Math.abs(i-currentPage)>1){if(i===3||i===total-2)html+=`<span class="pinfo">…</span>`;continue;}
    html+=`<button class="pbtn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html+=`<button class="pbtn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>下页 →</button>`;
  html+=`<span class="pinfo">共${filteredRows.length}条</span>`;
  pg.innerHTML=html;
}
function goPage(p){
  const total=Math.ceil(filteredRows.length/PAGE_SIZE);
  if(p<1||p>total)return;
  currentPage=p;renderCards();renderPagination();
  window.scrollTo({top:0,behavior:'smooth'});
}

// CLOSE MODALS ON BACKDROP
['note-modal','wa-modal','tag-filter-modal','export-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    if(e.target===document.getElementById(id)){
      if(id==='note-modal')closeNote();
      else if(id==='wa-modal')closeWA();
      else if(id==='tag-filter-modal')closeTagFilter();
      else closeExport();
    }
  });
});
